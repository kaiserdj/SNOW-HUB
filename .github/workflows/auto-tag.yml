name: Auto Tag on Version Bump

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        run: |
          NEW_VERSION=$(jq -r .version package.json)
          # Get the previous version of package.json. 
          # If it's the first commit, old_version will be empty.
          OLD_VERSION=$(git show HEAD^:package.json 2>/dev/null | jq -r .version || echo "none")
          
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "Version changed from $OLD_VERSION to $NEW_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Tag
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="v${{ steps.check.outputs.version }}"
          
          # Initialize git config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch tags to ensure we don't try to create a duplicate
          git fetch --tags
          
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists. Skipping..."
          else
            echo "Creating tag $VERSION"
            git tag "$VERSION"
            git push origin "$VERSION"
          fi
