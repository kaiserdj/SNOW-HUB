name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # We need to run the prep-ext script before building
      - name: Prepare extensions
        run: npm run prep-ext

      - name: Build and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run build && npx electron-builder --win --publish always
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run build && npx electron-builder --mac --publish always
          else
            npm run build && npx electron-builder --linux --publish always
          fi
        shell: bash
